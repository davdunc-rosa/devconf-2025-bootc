# Training Configuration for Fedora LLM Training

model:
  name: "microsoft/DialoGPT-small"  # Start with a small model for testing
  max_length: 512
  torch_dtype: "float16"  # Use float16 for GPU efficiency

dataset:
  name: "wikitext"
  subset: "wikitext-2-raw-v1"
  train_split: "train[:1000]"  # Small subset for initial testing
  validation_split: "validation[:100]"

training:
  output_dir: "./results"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  warmup_steps: 100
  learning_rate: 5e-5
  weight_decay: 0.01
  logging_steps: 50
  save_steps: 500
  eval_steps: 500
  save_total_limit: 2
  evaluation_strategy: "steps"
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false

hardware:
  use_gpu: true
  fp16: true
  gradient_checkpointing: true
  dataloader_num_workers: 4

logging:
  use_wandb: false  # Set to true if you want to use Weights & Biases
  project_name: "fedora-llm-training"
  run_name: "fedora-container-training"

inference:
  max_new_tokens: 100
  temperature: 0.7
  do_sample: true
  top_p: 0.9