# Fedora LLM Training Configuration

[training]
model_name = microsoft/DialoGPT-small
dataset_name = wikitext
output_dir = /opt/llm-training/results
max_length = 512
batch_size = 4
epochs = 3
learning_rate = 5e-5

[hardware]
use_gpu = true
fp16 = true
gradient_checkpointing = true

[logging]
log_level = INFO
log_dir = /var/log/llm-training
use_tensorboard = true
tensorboard_port = 6006

[security]
enable_ssh = true
ssh_port = 22
allowed_users = llm-user,fedora