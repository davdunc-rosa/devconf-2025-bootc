# RamaLama Configuration for Fedora LLM Training

[general]
# Model storage location
store = /opt/llm-training/models
# Container runtime
runtime = podman
# Default model format
format = gguf

[inference]
# Default inference settings
host = 0.0.0.0
port = 8080
# GPU acceleration
gpu = true
# Context length
ctx_size = 4096
# Number of threads
threads = 4

[models]
# Default models to pull
default_chat = llama2:7b-chat
default_code = codellama:7b-instruct
default_small = tinyllama:1.1b-chat

[security]
# Security settings
allow_origins = ["http://localhost:*", "https://localhost:*"]
# API key (set via environment variable RAMALAMA_API_KEY)
require_auth = false

[logging]
# Logging configuration
level = info
format = json
output = /var/log/ramalama.log